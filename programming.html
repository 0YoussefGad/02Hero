<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styel.css">
    <title>Programming Courses</title>
</head>
<body>

    <nav class="navSearch">
        <div class="logo">
            <h1>Courserizer</h1>
        </div>
        
        <div class="search-container">
            <input type="text" placeholder="Search by course name...">
            <button>Search</button>
        </div>

        <div class="back-button-container">
            <button class="back2"><a href="index.html">Back to Home</a></button>
        </div>
    </nav>

    <div style="margin-top: 50px; text-align: center;">
        <h1 style="font-size: 2.5rem; color: #1e293b;">Programming Hub</h1>
    </div>

    <div class="cards">
        <div class="card">
            <div class="image"><img src="images/programming-languages.jpg.webp" alt=""></div>
            <div class="courseName"><h3>C++</h3></div>
            <div class="cardinfo"><i class="fa-solid fa-user"></i> <p>Dr: Amr Ghonaim</p> <i class="fa-regular fa-clock"></i> <p>14 Hours</p></div>
        </div>
        <div class="card">
            <div class="image"><img src="images/programming-languages.jpg.webp" alt=""></div>
            <div class="courseName"><h3>Python</h3></div>
            <div class="cardinfo"><i class="fa-solid fa-user"></i> <p>Dr: Hassan Ahmed</p> <i class="fa-regular fa-clock"></i> <p>30 Hours</p></div>
        </div>
        <div class="card">
            <div class="image"><img src="images/programming-languages.jpg.webp" alt=""></div>
            <div class="courseName"><h3>C#</h3></div>
            <div class="cardinfo"><i class="fa-solid fa-user"></i> <p>Dr: Omar Ali</p> <i class="fa-regular fa-clock"></i> <p>8 Hours</p></div>
        </div>
        <div class="card">
            <div class="image"><img src="images/programming-languages.jpg.webp" alt=""></div>
            <div class="courseName"><h3>Javascript</h3></div>
            <div class="cardinfo"><i class="fa-solid fa-user"></i> <p>Dr: Amr Abas</p> <i class="fa-regular fa-clock"></i> <p>4 Hours</p></div>
        </div>
        <div class="card">
            <div class="image"><img src="images/programming-languages.jpg.webp" alt=""></div>
            <div class="courseName"><h3>CSS</h3></div>
            <div class="cardinfo"><i class="fa-solid fa-user"></i> <p>Dr: Reem Ahmed</p> <i class="fa-regular fa-clock"></i> <p>12 Hours</p></div>
        </div>
        <div class="card">
            <div class="image"><img src="images/programming-languages.jpg.webp" alt=""></div>
            <div class="courseName"><h3>HTML</h3></div>
            <div class="cardinfo"><i class="fa-solid fa-user"></i> <p>Dr: Rawan Omar</p> <i class="fa-regular fa-clock"></i> <p>13 Hours</p></div>
        </div>
    </div>

</body>
</html>
