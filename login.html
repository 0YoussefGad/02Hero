<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-box login-box">
            <div class="logo">
                <h2>مرحباً بعودتك</h2>
                <p>سجل الدخول إلى حسابك</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" placeholder="example@domain.com" required>
                </div>

                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="loginPassword" placeholder="********" required>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="rememberMe">
                    <label>تذكرني</label>
                    <a href="#" class="forgot-link" id="forgotPassword">نسيت كلمة المرور؟</a>
                </div>

                <button type="submit" class="btn btn-primary">دخول</button>
            </form>

            <div id="loginMessage" class="message"></div>

            <div class="form-footer">
                <p>ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a></p>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginMessage = document.getElementById('loginMessage');

        function showMessage(text, type) {
            loginMessage.textContent = text;
            loginMessage.className = `message ${type}`;
            setTimeout(() => {
                loginMessage.style.display = 'none';
                loginMessage.className = 'message';
            }, 3000);
        }

        function getUsers() {
            const users = localStorage.getItem('users');
            return users ? JSON.parse(users) : [];
        }

        function authenticateUser(email, password) {
            const users = getUsers();
            return users.find(user => user.email === email && user.password === password);
        }

        function getSavedEmail() {
            const savedEmail = localStorage.getItem('rememberedEmail');
            if (savedEmail) {
                document.getElementById('loginEmail').value = savedEmail;
                document.getElementById('rememberMe').checked = true;
            }
        }

        function saveEmail(email, remember) {
            if (remember) {
                localStorage.setItem('rememberedEmail', email);
            } else {
                localStorage.removeItem('rememberedEmail');
            }
        }

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const remember = document.getElementById('rememberMe').checked;

            if (!email || !password) {
                showMessage('الرجاء إدخال البريد الإلكتروني وكلمة المرور', 'error');
                return;
            }

            const user = authenticateUser(email, password);

            if (user) {
                saveEmail(email, remember);
                
                sessionStorage.setItem('currentUser', JSON.stringify({
                    id: user.id,
                    name: user.fullName,
                    email: user.email
                }));

                showMessage(`مرحباً ${user.fullName}! جاري التحويل...`, 'success');

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } else {
                showMessage('البريد الإلكتروني أو كلمة المرور غير صحيحة', 'error');
            }
        });

        document.getElementById('forgotPassword').addEventListener('click', function(e) {
            e.preventDefault();
            showMessage('سيتم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك الإلكتروني', 'success');
        });
        getSavedEmail();
    </script>
    <script src="main2.js"></script>
    <script src="main.js"></script>
</body>
</html>
